name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.3.app/Contents/Developer

    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v3
        with:
          cache: true

      - name: Verify
        run: ./scripts/verify
